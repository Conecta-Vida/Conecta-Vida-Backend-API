# ===================================================================
spring.application.name=conectaavida-api
server.port=8080

# ===================================================================
# CONFIGURAÇÃO SUPABASE - MODO SESSÃO (AWS-1 SÃO PAULO)
# ===================================================================
spring.datasource.url=jdbc:postgresql://aws-1-sa-east-1.pooler.supabase.com:6543/postgres
spring.datasource.username=postgres.pborxjuuexiqollesfxw
spring.datasource.password=ConectaVida_@2121
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# CONFIGURAÇÕES DO HIBERNATE E FLYWAY
# ===================================================================
# Valida se as classes do Java combinam perfeitamente com a DDL do Supabase
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=false

# Evita o carregamento preguiçoso fora de transações ativas
spring.jpa.open-in-view=true

# ===================================================================
# CONFIGURAÇÕES DE ENVIO DE E-MAIL (ALERTA DE SEGURANÇA)
# ===================================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587

# E-mail corporativo que vai disparar os alertas do sistema
spring.mail.username=luizhenriquegoncalves147@gmail.com

# Senha de Aplicativo de 16 dígitos gerada na Conta Google (Segurança)
spring.mail.password=zdlthelrelhutfzn

# Propriedades de protocolo SMTP obrigatórias para autenticação TLS TLS
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Força o ecossistema Java a confiar no certificado SSL da Google (Previne Erro PKIX)
spring.mail.properties.mail.smtp.ssl.trust=*

# ===================================================================
# CONFIGURAÇÕES DE BLINDAGEM E SEGURANÇA DA API (OWASP REQS)
